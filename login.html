{% extends "taxiapp/base.html" %}
{% block title %}Login – TaxiApp{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-4 shadow">
        <div class="text-center mb-4">
          <span style="font-size:3rem;">🚕</span>
          <h3 class="mt-2 fw-bold">Welcome Back</h3>
        </div>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input type="text" name="username" class="form-control" required autofocus />
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control" required />
          </div>
          <button type="submit" class="btn btn-taxi w-100 py-2 fs-5">Login</button>
        </form>
        <hr />
        <p class="text-center mb-0">Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
