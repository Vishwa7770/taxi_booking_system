{% extends "taxiapp/base.html" %}
{% block title %}Sign Up – TaxiApp{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card p-4 shadow">
        <div class="text-center mb-4">
          <span style="font-size:3rem;">🚕</span>
          <h3 class="mt-2 fw-bold">Create an Account</h3>
        </div>
        <form method="post">
          {% csrf_token %}
          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="form-label fw-semibold">First Name</label>
              <input type="text" name="first_name" class="form-control" />
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold">Last Name</label>
              <input type="text" name="last_name" class="form-control" />
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Username *</label>
            <input type="text" name="username" class="form-control" required />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" name="email" class="form-control" />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Phone</label>
            <input type="tel" name="phone" class="form-control" placeholder="+1 555 000 0000" />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Password *</label>
            <input type="password" name="password1" class="form-control" required minlength="8" />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Confirm Password *</label>
            <input type="password" name="password2" class="form-control" required />
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold d-block">Register as</label>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="role" id="roleRider" value="rider" checked />
              <label class="form-check-label" for="roleRider"><i class="bi bi-person"></i> Rider</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="role" id="roleDriver" value="driver" />
              <label class="form-check-label" for="roleDriver"><i class="bi bi-car-front"></i> Driver</label>
            </div>
          </div>
          <button type="submit" class="btn btn-taxi w-100 py-2 fs-5">Create Account</button>
        </form>
        <hr />
        <p class="text-center mb-0">Already have an account? <a href="{% url 'login' %}">Login</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
